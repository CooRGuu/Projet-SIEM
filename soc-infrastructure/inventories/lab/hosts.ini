[wazuh_manager]
wazuh-manager-lab ansible_host=127.0.0.1 ansible_port=2222 ansible_user=ansible ansible_password=ansible

[wazuh_agents_linux]
wazuh-agent-lab ansible_host=127.0.0.1 ansible_port=2223 ansible_user=ansible ansible_password=ansible

[all:vars]
# Permet à Ansible de trouver Python dans les conteneurs
ansible_python_interpreter=/usr/bin/python3

